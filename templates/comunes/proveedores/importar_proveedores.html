<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Importar proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Importar proveedores</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('btn_proveedores_importar_bp.btn_proveedores_importar') }}"
                          method="post"
                          enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="archivo" class="form-label">Archivo CSV</label>
                            <input type="file" class="form-control" id="archivo" name="archivo" accept=".csv,text/csv" required>
                        </div>

                        <div class="alert alert-info small mb-3">
                            El CSV debe llevar columnas como <strong>NIF</strong> y <strong>Nombre_Razon_Social</strong>.
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Subir e importar</button>
                            <a href="{{ url_for('btn_proveedores_importar_bp.btn_proveedores_importar') }}"
                               class="btn btn-secondary">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            {% if resultado %}
            <div class="card mt-4 shadow-sm">
                <div class="card-header">
                    Resultado
                </div>
                <div class="card-body">
                    <p class="mb-1"><strong>Insertados:</strong> {{ insertados }}</p>
                    <p class="mb-1"><strong>Existentes:</strong> {{ existentes }}</p>

                    {% if errores %}
                    <div class="alert alert-warning mt-3">
                        <ul class="mb-0">
                            {% for error in errores %}
                            <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
