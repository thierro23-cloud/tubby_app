{# templates/parquin/editar_plaza.html #}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar plaza {{ plaza.codigo_plazas }}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 1.5rem; }
    h1 { margin-bottom: 1rem; }

    form { background:#fff; padding:1rem 1.2rem; border-radius:4px; max-width:500px; }
    label { display:block; margin-top:.6rem; font-size:.9rem; color:#555; }
    input[type="text"], textarea {
      width:100%; padding:.3rem .5rem; box-sizing:border-box;
      border:1px solid #ccc; border-radius:3px; font-family:inherit;
    }
    textarea { min-height:80px; resize:vertical; }

    .acciones { margin-top:1rem; display:flex; gap:.5rem; justify-content:flex-end; }

    .btn { padding:.3rem .7rem; border-radius:3px; border:none; cursor:pointer; font-size:.9rem; }
    .btn-primario { background:#1976d2; color:#fff; }
    .btn-secundario { background:#9e9e9e; color:#fff; text-decoration:none; display:inline-block; }

    .info { margin-bottom:.5rem; color:#666; }
  </style>
</head>
<body>

<h1>Editar plaza {{ plaza.codigo_plazas }}</h1>

<div class="info">
  Fila: <strong>{{ plaza.fila }}</strong> · ID interno: {{ plaza.idtbl_plazas }}
</div>

<form method="post" action="">
  <label for="codigo_plazas">Código de plaza</label>
  <input type="text" id="codigo_plazas" name="codigo_plazas"
         value="{{ plaza.codigo_plazas or '' }}" required>

  <label for="observaciones">Observaciones</label>
  <textarea id="observaciones" name="observaciones">{{ plaza.observaciones or '' }}</textarea>

  <div class="acciones">
    <a class="btn btn-secundario"
       href="{{ url_for('plazas_bp.ver_fila', fila_num=plaza.fila) }}">
      ⟵ Volver a fila
    </a>
    <button type="submit" class="btn btn-primario">💾 Guardar cambios</button>
  </div>
</form>

</body>
</html>
