<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Vigilante - Supertinito App</title>
<style>
/* --------------------------- General --------------------------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #4e54c8, #8f94fb);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
}
.container {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 500px;
}

/* --------------------------- Títulos --------------------------- */
h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

/* --------------------------- Inputs y botones --------------------------- */
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 16px;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #4e54c8;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.3s;
}
button:hover {
    background-color: #3b3fc1;
}

/* --------------------------- Flash --------------------------- */
.flash-messages div {
    padding: 10px 15px;
    border-radius: 5px;
    margin-bottom: 10px;
}
.flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.flash-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #555;
}
</style>
</head>
<body>

<div class="container">
    <h2>Panel Vigilante</h2>

    <!-- Mensajes flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <!-- Formulario de entrada de camión -->
    <form method="POST">
        <input type="text" name="matricula" placeholder="Matrícula del camión" required>
        <button type="submit">Registrar Entrada</button>
    </form>

    <div style="margin-top:20px; text-align:center;">
        <a href="{{ url_for('vigilante.plano_vigilante') }}">
            <button type="button">Ver Plano del Parquin</button>
        </a>
        <a href="{{ url_for('vigilante.consultas_vigilante') }}">
            <button type="button" style="margin-top:10px;">Consultas y Exportar XLS</button>
        </a>
    </div>

    <div class="footer">
        2026 Supertinito App
    </div>
</div>

</body>
</html>
