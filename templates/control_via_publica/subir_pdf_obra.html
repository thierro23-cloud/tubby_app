{% extends "base.html" %}
{% block title %}Nueva obra desde PDF{% endblock %}

{% block content %}
<div class="container mt-4">

  <h1 class="h4 mb-3">📄 Nueva obra desde PDF</h1>

  <div class="alert alert-info">
    ✅ Sube un PDF de texto y el sistema intentará pre-rellenar proveedor, calle y fechas.
    Luego podrás revisarlo antes de guardar.
  </div>

  <form method="post" enctype="multipart/form-data" class="card p-3">
    <label class="form-label">PDF</label>
    <input class="form-control" type="file" name="pdf" accept="application/pdf" required>

    <div class="mt-3">
      <button class="btn btn-primary" type="submit">🚀 Importar y pre-rellenar</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('control_obras_bp.control_obras') }}">Cancelar</a>
    </div>
  </form>

</div>
{% endblock %}
