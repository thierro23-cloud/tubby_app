<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; font-size: 16px; }
        button { padding: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Recuperar Contraseña</h1>

    <form method="POST" action="/auth/forgot_password">
        <label>Introduce tu Número Profesional:</label>
        <input type="text" name="numero_profesional" required>

        <button type="submit">Enviar contraseña temporal</button>
    </form>

    <p><a href="/auth/login">Volver al login</a></p>
</body>
</html>
