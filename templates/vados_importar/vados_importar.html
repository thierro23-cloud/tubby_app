<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Importar vados desde Excel</title>
</head>
<body>
  <h1>Importar vados desde Excel</h1>
  <form action="" method="post" enctype="multipart/form-data">
    <div>
      <label>Fichero Excel (vadosok):</label>
      <input type="file" name="file" accept=".xls,.xlsx,.csv" required>
    </div>
    <div>
      <label>ID gestor:</label>
      <input type="number" name="idtbl_gestores" value="1" required>
    </div>
    <button type="submit">Subir e importar</button>
  </form>
</body>
</html>
